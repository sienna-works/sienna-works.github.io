<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Home | Sienna Works</title>
	<link href="bootstrap.min.css" rel="stylesheet">
	<link href="site.css" rel="stylesheet">
	<script src="marked.min.js"></script>
	<script src="navbar.js"></script>
	<script src="home.js"></script>
	<script src="bootstrap.bundle.min.js"></script>
</head>

<body class="bg-light min-vh-100 d-flex flex-column">
	<div id="navbar-container"></div>
	<main class="flex-grow-1 container my-5">
		<div id="content">Loading...</div>
	</main>

	<footer class="bg-sienna text-light py-4 mt-auto">
		<div class="container text-center">
			<p>&copy; <span id="copyrightYear"></span> Sienna Works. All rights reserved.</p>
		</div>
	</footer>

	<script>
		document.getElementById("copyrightYear").innerText = new Date().getFullYear();

		if (document.readyState === 'loading') {
			document.addEventListener('DOMContentLoaded', nav);
		} else {
			nav();
		}

		function evaluateWindowLocationHash(event) {
			const pageName = window.location.hash
				? window.location.hash.substring(1)
				: 'home';

			if (pageName === 'home')
				fetchPosts();
			else if (pageName.endsWith('md'))
				navPostFromFileName(pageName);
			else
				navPage(`${pageName}.html`);

			const links = document.querySelectorAll('.nav-link');

			// Highlight page of nav
			for (const link of links) {
				if (link.id === pageName)
					link.classList.add('active');
				else
					link.classList.remove('active');
			}
		}

		addEventListener("hashchange", (event) =>
			evaluateWindowLocationHash(event));

		// re-fetch posts upon possible change of ?page= while at 'home'
		window.navigation.addEventListener("navigate",
			e => {
				const url = new URL(e.destination.url);
				const pageName = url.hash
					? url.hash.substring(1)
					: 'home';

				if (pageName === 'home')
					fetchPosts();
			});

		// Initialize by loading hash change
		evaluateWindowLocationHash();
	</script>

</body>

</html>
